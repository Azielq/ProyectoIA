<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Call Center Assistant</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle" id="sidebar-toggle" title="Cerrar sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="sidebar-title">Call Center AI</span>
        </div>

        <button class="new-chat-btn" id="new-chat-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Nueva conversacion
        </button>

        <div class="sidebar-section-label">Conversaciones</div>
        <div class="conversation-list" id="conversation-list">
            <div class="conversation-empty" id="conversation-empty">Sin conversaciones aun</div>
        </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main">
        <!-- Top bar (mobile) -->
        <div class="topbar">
            <button class="sidebar-toggle" id="topbar-toggle" title="Abrir sidebar">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            </button>
            <span class="topbar-title" id="topbar-title">Call Center AI</span>
        </div>

        <!-- Welcome / messages area -->
        <div class="chat-area" id="chat-area">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="url(#grad)" stroke-width="1.5">
                        <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#818cf8"/><stop offset="100%" style="stop-color:#c084fc"/></linearGradient></defs>
                        <path d="M12 2a3 3 0 0 0-3 3v1a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10a7 7 0 0 1-14 0"/><path d="M12 17v4"/><path d="M8 21h8"/>
                    </svg>
                </div>
                <h1 class="welcome-title">Hola, sube un audio para comenzar</h1>
                <p class="welcome-sub">Transcribe llamadas de call center y hazle preguntas con IA</p>

                <div class="upload-card" id="upload-card">
                    <label for="audio-file" class="upload-drop-area" id="drop-area">
                        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="upload-icon">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <span class="upload-drop-text" id="file-name">Arrastra un archivo MP3 o haz clic para seleccionar</span>
                        <input type="file" id="audio-file" accept=".mp3,audio/mpeg" hidden>
                    </label>
                    <button class="upload-btn" id="upload-btn" disabled>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        Subir y Transcribir
                    </button>
                    <div id="upload-status" class="upload-status"></div>
                </div>
            </div>

            <div id="messages" class="messages"></div>
        </div>

        <!-- Input bar -->
        <div class="input-wrapper">
            <form id="chat-form" class="input-bar">
                <input type="text" id="question" placeholder="Pregunta algo sobre la llamada..." autocomplete="off" required>
                <button type="submit" id="send-btn" title="Enviar">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                </button>
            </form>
            <p class="disclaimer">Call Center AI puede cometer errores. Verifica la informacion importante.</p>
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <script src="/static/script.js"></script>
</body>
</html>
